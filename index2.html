<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Report Editor</title>
<style>
  :root {
    --bg: #fafafa;
    --surface: #fff;
    --border: #e5e5e5;
    --text: #1a1a1a;
    --text-secondary: #666;
    --accent: #0066cc;
    --radius: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--text-secondary);
    font-size: 15px;
    margin-bottom: 40px;
  }

  .section {
    margin-bottom: 32px;
  }

  .section label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    min-height: 120px;
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    background: var(--surface);
    resize: vertical;
    transition: border-color 0.2s;
  }

  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  textarea::placeholder {
    color: #bbb;
  }

  .template-picker {
    margin-bottom: 40px;
  }

  .template-picker label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }

  .templates {
    display: flex;
    gap: 12px;
  }

  .template-card {
    flex: 1;
    padding: 20px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
  }

  .template-card:hover {
    border-color: #ccc;
  }

  .template-card.active {
    border-color: var(--accent);
  }

  .template-card h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .template-card p {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .actions {
    display: flex;
    gap: 12px;
    margin-top: 40px;
  }

  button {
    padding: 12px 28px;
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-primary {
    background: var(--text);
    color: #fff;
  }

  .btn-primary:hover {
    background: #333;
  }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: #f5f5f5;
  }

  /* Preview overlay */
  .preview-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }

  .preview-overlay.active {
    display: flex;
  }

  .preview-frame {
    width: 90vw;
    height: 85vh;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }

  .preview-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.06);
    border: none;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .preview-iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .output-section {
    display: none;
    margin-top: 40px;
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .output-section.active { display: block; }

  .output-section h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .output-actions {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }

  .code-block {
    background: #f5f5f5;
    border-radius: 8px;
    padding: 16px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    overflow-x: auto;
    max-height: 200px;
    overflow-y: auto;
    display: none;
  }

  .code-block.active { display: block; margin-top: 12px; }
</style>
</head>
<body>

<div class="container">
  <h1>Weekly Report</h1>
  <p class="subtitle">Fill in the sections below. Choose a template. Generate slides.</p>

  <div class="template-picker">
    <label>Template</label>
    <div class="templates">
      <div class="template-card active" data-template="mono" onclick="selectTemplate(this)">
        <h3>Mono</h3>
        <p>Black and white. Pure typography.</p>
      </div>
      <div class="template-card" data-template="soft" onclick="selectTemplate(this)">
        <h3>Soft</h3>
        <p>Warm neutrals. Gentle contrast.</p>
      </div>
    </div>
  </div>

  <div class="section">
    <label>Summary</label>
    <textarea id="summary" placeholder="High-level overview of this week"></textarea>
  </div>

  <div class="section">
    <label>Progress Status</label>
    <textarea id="progress" placeholder="Feature progress, milestones hit"></textarea>
  </div>

  <div class="section">
    <label>Newsletter</label>
    <textarea id="newsletter" placeholder="Design direction, team updates"></textarea>
  </div>

  <div class="section">
    <label>Others</label>
    <textarea id="others" placeholder="Anything else worth noting"></textarea>
  </div>

  <div class="section">
    <label>Top of Mind</label>
    <textarea id="topofmind" placeholder="What's occupying your thoughts this week"></textarea>
  </div>

  <div class="actions">
    <button class="btn-primary" onclick="generate()">Generate Slides</button>
    <button class="btn-secondary" onclick="preview()">Preview</button>
  </div>

  <div class="output-section" id="output">
    <h3>Generated</h3>
    <div class="output-actions">
      <button class="btn-secondary" onclick="downloadHTML()">Download HTML</button>
      <button class="btn-secondary" onclick="toggleCode()">View Source</button>
      <button class="btn-secondary" onclick="copyHTML()">Copy HTML</button>
    </div>
    <pre class="code-block" id="codeBlock"></pre>
  </div>
</div>

<div class="preview-overlay" id="previewOverlay">
  <div class="preview-frame">
    <button class="preview-close" onclick="closePreview()">✕</button>
    <iframe class="preview-iframe" id="previewIframe"></iframe>
  </div>
</div>

<script>
let selectedTemplate = 'mono';
let generatedHTML = '';

function selectTemplate(el) {
  document.querySelectorAll('.template-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selectedTemplate = el.dataset.template;
}

function getData() {
  return {
    summary: document.getElementById('summary').value.trim(),
    progress: document.getElementById('progress').value.trim(),
    newsletter: document.getElementById('newsletter').value.trim(),
    others: document.getElementById('others').value.trim(),
    topofmind: document.getElementById('topofmind').value.trim(),
  };
}

function getWeekLabel() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 1);
  const week = Math.ceil(((now - start) / 86400000 + start.getDay() + 1) / 7);
  return `Week ${week}, ${now.getFullYear()}`;
}

function textToHTML(text) {
  if (!text) return '';
  return text.split('\n').filter(l => l.trim()).map(l => {
    const trimmed = l.trim();
    if (trimmed.startsWith('- ') || trimmed.startsWith('• ')) {
      return `<li>${trimmed.slice(2)}</li>`;
    }
    return `<p>${trimmed}</p>`;
  }).join('\n').replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
}

const templates = {
  mono: {
    bg: '#000',
    surface: '#111',
    text: '#fff',
    textSecondary: 'rgba(255,255,255,0.5)',
    accent: '#fff',
    border: 'rgba(255,255,255,0.1)',
    font: "'SF Pro Display', -apple-system, system-ui, sans-serif",
    sectionBg: '#111',
  },
  soft: {
    bg: '#f5f0eb',
    surface: '#fff',
    text: '#2c2c2c',
    textSecondary: '#999',
    accent: '#2c2c2c',
    border: 'rgba(0,0,0,0.06)',
    font: "'Georgia', 'Times New Roman', serif",
    sectionBg: '#fff',
  }
};

function buildSlides(data, tmpl) {
  const t = templates[tmpl];
  const week = getWeekLabel();
  const sections = [
    { title: 'Summary', content: data.summary },
    { title: 'Progress', content: data.progress },
    { title: 'Newsletter', content: data.newsletter },
    { title: 'Others', content: data.others },
    { title: 'Top of Mind', content: data.topofmind },
  ].filter(s => s.content);

  const slideHTML = sections.map(s => `
    <section class="slide">
      <div class="slide-inner">
        <span class="slide-label">${s.title}</span>
        <div class="slide-content">${textToHTML(s.content)}</div>
      </div>
    </section>
  `).join('');

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Report — ${week}</title>
<style>
  

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-snap-type: y mandatory;
    overflow-y: scroll;
    scroll-behavior: smooth;
  }

  body {
    font-family: ${t.font};
    background: ${t.bg};
    color: ${t.text};
  }

  .slide {
    min-height: 100vh;
    scroll-snap-align: start;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10vh 10vw;
  }

  .slide-inner {
    max-width: 640px;
    width: 100%;
  }

  .slide-label {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: ${t.textSecondary};
    margin-bottom: 24px;
  }

  .slide-content p {
    font-size: 22px;
    line-height: 1.7;
    margin-bottom: 16px;
  }

  .slide-content ul {
    list-style: none;
    padding: 0;
  }

  .slide-content li {
    font-size: 20px;
    line-height: 1.7;
    padding-left: 20px;
    position: relative;
    margin-bottom: 8px;
  }

  .slide-content li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: ${t.textSecondary};
  }

  /* Title slide */
  .title-slide {
    min-height: 100vh;
    scroll-snap-align: start;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10vh 10vw;
  }

  .title-slide h1 {
    font-size: 48px;
    font-weight: 600;
    letter-spacing: -1px;
  }

  .title-slide .week {
    font-size: 15px;
    color: ${t.textSecondary};
    margin-top: 12px;
    font-weight: 400;
  }

  /* Nav hint */
  .nav-hint {
    position: fixed;
    bottom: 24px;
    right: 24px;
    font-size: 12px;
    color: ${t.textSecondary};
    opacity: 0.6;
  }

  /* Progress dots */
  .progress {
    position: fixed;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .progress .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: ${t.textSecondary};
    opacity: 0.3;
    transition: opacity 0.3s;
  }

  .progress .dot.active {
    opacity: 1;
    background: ${t.accent};
  }

  @media (max-width: 768px) {
    .slide { padding: 8vh 6vw; }
    .slide-content p { font-size: 18px; }
    .slide-content li { font-size: 17px; }
    .title-slide h1 { font-size: 32px; }
    .progress { display: none; }
  }
</style>
</head>
<body>

<section class="title-slide">
  <div>
    <h1>Weekly Report</h1>
    <div class="week">${week}</div>
  </div>
</section>

${slideHTML}

<div class="progress" id="progress">
  <div class="dot active"></div>
  ${sections.map(() => '<div class="dot"></div>').join('\n  ')}
</div>

<div class="nav-hint">↓ scroll · ← → keys</div>

<script>
  const slides = document.querySelectorAll('.slide, .title-slide');
  const dots = document.querySelectorAll('.progress .dot');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const idx = [...slides].indexOf(entry.target);
        dots.forEach((d, i) => d.classList.toggle('active', i === idx));
      }
    });
  }, { threshold: 0.5 });
  slides.forEach(s => observer.observe(s));

  document.addEventListener('keydown', e => {
    const current = [...slides].findIndex(s => {
      const r = s.getBoundingClientRect();
      return r.top >= -100 && r.top <= window.innerHeight / 2;
    });
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
      e.preventDefault();
      const next = Math.min(current + 1, slides.length - 1);
      slides[next].scrollIntoView({ behavior: 'smooth' });
    }
    if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      e.preventDefault();
      const prev = Math.max(current - 1, 0);
      slides[prev].scrollIntoView({ behavior: 'smooth' });
    }
  });
<\/script>
</body>
</html>`;
}

function generate() {
  const data = getData();
  if (!data.summary && !data.progress) {
    alert('Fill in at least Summary or Progress.');
    return;
  }
  generatedHTML = buildSlides(data, selectedTemplate);
  document.getElementById('output').classList.add('active');
  document.getElementById('codeBlock').textContent = generatedHTML;
}

function preview() {
  const data = getData();
  if (!data.summary && !data.progress) {
    alert('Fill in at least Summary or Progress.');
    return;
  }
  generatedHTML = buildSlides(data, selectedTemplate);
  const iframe = document.getElementById('previewIframe');
  const overlay = document.getElementById('previewOverlay');
  overlay.classList.add('active');
  iframe.srcdoc = generatedHTML;
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('active');
}

function downloadHTML() {
  if (!generatedHTML) return;
  const blob = new Blob([generatedHTML], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `weekly-report-${new Date().toISOString().slice(0,10)}.html`;
  a.click();
}

function toggleCode() {
  document.getElementById('codeBlock').classList.toggle('active');
}

function copyHTML() {
  if (!generatedHTML) return;
  navigator.clipboard.writeText(generatedHTML);
}
</script>
</body>
</html>
